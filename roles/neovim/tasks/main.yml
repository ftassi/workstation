- name: Ensure neovim is not installed from repo
  become: true
  ansible.builtin.apt: 
    pkg:
    - vim
    - neovim
    state: absent

- name: Add nvim ppa
  become: true
  ansible.builtin.apt_repository:
    repo: ppa:neovim-ppa/unstable

- name: Install neovim deps
  become: true
  ansible.builtin.apt:
    pkg:
      - python3-dev
      - python3-pip
      - python3-neovim
      - neovim

- name: Use nvim as vim alternative
  become: true
  community.general.alternatives:
    name: vim
    path: /usr/bin/nvim
    link: /usr/bin/vim
    priority: 10
    state: present

